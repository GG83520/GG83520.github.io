<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ROC D'AZUR 2026 — Ma Fiche</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;600&display=swap');

  :root {
    --rouge: #C0392B; --rouge-vif: #E74C3C; --orange: #E67E22;
    --dark: #0D1117; --dark2: #161B22; --dark3: #1C2333; --card: #1E2A3A;
    --texte: #E6EDF3; --texte2: #8B949E;
    --vert: #238636; --vert-clair: #3FB950;
    --bleu: #1F6FEB; --bleu-clair: #58A6FF;
    --jaune: #D29922; --jaune-clair: #E3B341;
    --or: #B7950B; --or-clair: #F0D060;
    --border: rgba(255,255,255,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--dark); color: var(--texte); font-family: 'Barlow', sans-serif; font-size: 15px; min-height: 100vh; display: flex; flex-direction: column; }

  /* LOGIN */
  #screenLogin { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px 20px; background: radial-gradient(ellipse at 50% 0%, rgba(192,57,43,0.15) 0%, transparent 70%), var(--dark); }
  .login-logo { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 3px; color: var(--texte2); text-transform: uppercase; margin-bottom: 8px; }
  .login-title { font-family: 'Barlow Condensed', sans-serif; font-size: 38px; font-weight: 900; letter-spacing: 2px; color: var(--texte); line-height: 1; text-align: center; margin-bottom: 4px; }
  .login-title span { color: var(--rouge-vif); }
  .login-subtitle { font-size: 13px; color: var(--texte2); text-align: center; margin-bottom: 36px; font-weight: 300; }
  .login-card { background: var(--dark2); border: 1px solid var(--border); border-radius: 16px; padding: 28px 24px; width: 100%; max-width: 360px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
  .input-group { margin-bottom: 16px; }
  .input-group label { display: block; font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 1.5px; color: var(--texte2); text-transform: uppercase; margin-bottom: 7px; }
  .input-group input { width: 100%; background: var(--dark3); border: 1px solid var(--border); border-radius: 10px; color: var(--texte); padding: 14px 16px; font-family: 'Barlow Condensed', sans-serif; font-size: 24px; font-weight: 700; letter-spacing: 2px; text-align: center; outline: none; transition: border-color 0.2s, background 0.2s; -webkit-appearance: none; }
  .input-group input:focus { border-color: var(--rouge); background: rgba(192,57,43,0.08); }
  .input-group input.error { border-color: var(--rouge-vif); background: rgba(231,76,60,0.1); animation: shake 0.3s ease; }
  @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }

  /* Boutons source */
  .source-btns { display: flex; gap: 10px; }
  .source-btn { flex: 1; padding: 13px 8px; border-radius: 10px; border: 1.5px solid var(--border); background: rgba(255,255,255,0.04); color: var(--texte2); cursor: pointer; text-align: center; font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 0.5px; transition: all 0.15s; line-height: 1.3; }
  .source-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--texte); }
  .source-btn.active-ts { background: rgba(192,57,43,0.2); border-color: var(--rouge-vif); color: #fff; }
  .source-btn.active-lg { background: rgba(183,149,11,0.2); border-color: var(--or-clair); color: var(--or-clair); }

  /* Jours */
  .jour-btn { width: 100%; padding: 11px 16px; border-radius: 8px; background: rgba(255,255,255,0.05); border: 1.5px solid rgba(255,255,255,0.1); color: var(--texte2); cursor: pointer; text-align: left; font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 600; letter-spacing: 1px; transition: all 0.15s; }
  .jour-btn.active { background: rgba(192,57,43,0.15); border-color: var(--rouge-vif); color: var(--texte); font-weight: 700; }

  .btn-login { width: 100%; padding: 15px; background: linear-gradient(135deg, var(--rouge) 0%, var(--rouge-vif) 100%); border: none; border-radius: 10px; color: #fff; font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 900; letter-spacing: 2px; cursor: pointer; transition: opacity 0.15s, transform 0.1s; margin-top: 4px; box-shadow: 0 4px 16px rgba(192,57,43,0.4); }
  .btn-login:active { opacity: 0.85; transform: scale(0.98); }
  .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .error-msg { color: var(--rouge-vif); font-size: 13px; text-align: center; margin-top: 12px; font-weight: 500; min-height: 18px; }
  .login-jour-badge { text-align: center; margin-top: 20px; font-size: 12px; color: var(--texte2); }
  .login-jour-badge strong { color: var(--jaune-clair); font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 1px; }

  /* FICHE */
  #screenFiche { display: none; flex-direction: column; min-height: 100vh; }
  .fiche-header { background: linear-gradient(135deg, var(--dark2) 0%, #1a0a08 100%); border-bottom: 3px solid var(--rouge); padding: 14px 16px 12px; position: sticky; top: 0; z-index: 50; }
  .fiche-header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .fiche-event { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 2px; color: var(--rouge-vif); text-transform: uppercase; }
  .btn-retour { background: rgba(255,255,255,0.08); border: 1px solid var(--border); color: var(--texte2); border-radius: 6px; padding: 5px 12px; font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .fiche-ps-title { font-family: 'Barlow Condensed', sans-serif; font-size: 28px; font-weight: 900; line-height: 1.1; color: var(--texte); }
  .fiche-ps-title span { color: var(--rouge-vif); }
  .fiche-jour-bar { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
  .jour-chip { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 1px; padding: 3px 10px; border-radius: 20px; background: var(--rouge); color: #fff; }
  .date-chip { font-size: 12px; color: var(--texte2); font-weight: 400; }
  .fiche-body { flex: 1; padding: 16px; display: flex; flex-direction: column; gap: 12px; }

  /* Cards */
  .fiche-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
  .fiche-card-header { display: flex; align-items: center; gap: 10px; padding: 11px 16px 10px; border-bottom: 1px solid var(--border); }
  .card-icon { font-size: 18px; line-height: 1; }
  .card-title { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 1.5px; color: var(--texte2); text-transform: uppercase; }
  .fiche-card-body { padding: 14px 16px; }
  .info-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .info-row:last-child { border-bottom: none; padding-bottom: 0; }
  .info-row:first-child { padding-top: 0; }
  .info-label { font-size: 12px; color: var(--texte2); font-weight: 400; white-space: nowrap; min-width: 90px; padding-top: 1px; }
  .info-val { font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 700; color: var(--texte); text-align: right; line-height: 1.2; }
  .info-val.highlight { color: var(--jaune-clair); }
  .info-val.secteur { color: var(--bleu-clair); }
  .info-val.tel { color: var(--jaune-clair); font-size: 20px; letter-spacing: 1px; }

  .hmep-display { text-align: center; padding: 10px 0 6px; }
  .hmep-heure { font-family: 'Barlow Condensed', sans-serif; font-size: 56px; font-weight: 900; line-height: 1; color: var(--vert-clair); text-shadow: 0 0 30px rgba(63,185,80,0.4); }
  .hmep-label { font-size: 12px; color: var(--texte2); margin-top: 4px; letter-spacing: 1px; }

  .veh-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(31,111,235,0.15); border: 1px solid rgba(88,166,255,0.25); border-radius: 8px; padding: 10px 16px; margin-top: 4px; width: 100%; }
  .veh-icon { font-size: 22px; }
  .veh-nom { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 900; color: var(--bleu-clair); }

  .radios-grid { display: flex; gap: 10px; flex-wrap: wrap; padding-top: 4px; }
  .radio-card { flex: 1; min-width: 80px; border-radius: 10px; padding: 12px 10px; text-align: center; border: 1px solid; }
  .radio-card.com { background: rgba(31,111,235,0.12); border-color: rgba(88,166,255,0.3); }
  .radio-card.crs { background: rgba(192,57,43,0.12); border-color: rgba(231,76,60,0.3); }
  .radio-card.cmv { background: rgba(35,134,54,0.12); border-color: rgba(63,185,80,0.3); }
  .radio-card.off { background: rgba(255,255,255,0.03); border-color: rgba(255,255,255,0.06); opacity: 0.4; }
  .radio-nb { font-family: 'Barlow Condensed', sans-serif; font-size: 30px; font-weight: 900; line-height: 1; }
  .radio-card.com .radio-nb { color: var(--bleu-clair); }
  .radio-card.crs .radio-nb { color: var(--rouge-vif); }
  .radio-card.cmv .radio-nb { color: var(--vert-clair); }
  .radio-card.off .radio-nb { color: var(--texte2); }
  .radio-type { font-size: 11px; font-weight: 600; letter-spacing: 1px; color: var(--texte2); margin-top: 3px; }

  .course-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .course-item:last-child { border-bottom: none; }
  .course-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .course-nom { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; color: var(--texte); flex: 1; }

  .equipe-list { display: flex; flex-direction: column; gap: 6px; padding-top: 4px; }
  .equipe-item { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.03); border-radius: 8px; padding: 8px 12px; }
  .equipe-avatar { width: 30px; height: 30px; border-radius: 50%; background: linear-gradient(135deg, var(--dark3), var(--card)); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; color: var(--texte2); flex-shrink: 0; }
  .equipe-nom { font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700; color: var(--texte); flex: 1; }
  .equipe-ps { font-size: 11px; color: var(--texte2); background: rgba(255,255,255,0.06); border-radius: 4px; padding: 2px 6px; }

  .obs-text { font-size: 14px; color: var(--jaune-clair); line-height: 1.5; font-style: italic; padding: 4px 0; }

  .urgence-banner { background: rgba(192,57,43,0.12); border: 1px solid rgba(231,76,60,0.3); border-radius: 12px; padding: 14px 16px; text-align: center; }
  .urgence-title { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 1.5px; color: var(--rouge-vif); text-transform: uppercase; margin-bottom: 4px; }
  .urgence-text { font-size: 13px; color: var(--texte2); line-height: 1.4; }
  .urgence-text strong { color: var(--texte); }

  .notfound { text-align: center; padding: 40px 20px; font-family: 'Barlow Condensed', sans-serif; font-size: 18px; color: var(--texte2); }
  .notfound span { display: block; font-size: 48px; margin-bottom: 12px; }

  /* Badge secteur header fiche */
  .secteur-badge { display: inline-block; margin-left: 8px; font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 1px; padding: 2px 8px; border-radius: 4px; vertical-align: middle; }
  .secteur-badge.ts { background: rgba(192,57,43,0.25); color: var(--rouge-vif); }
  .secteur-badge.lg { background: rgba(183,149,11,0.25); color: var(--or-clair); }
</style>
</head>
<body>

<!-- ======= ÉCRAN LOGIN ======= -->
<div id="screenLogin">
  <div class="login-logo">CCFF · RSA</div>
  <div class="login-title">ROC D'AZUR <span>2026</span></div>
  <div class="login-subtitle">Ma fiche point signaleur</div>

  <div class="login-card">

    <!-- Étape 1 : Secteur -->
    <div class="input-group">
      <label>Secteur</label>
      <div class="source-btns">
        <button class="source-btn active-ts" id="btnTS" onclick="setSource('ts')">
          🗺 Tous Secteurs
        </button>
        <button class="source-btn" id="btnLG" onclick="setSource('lg')">
          🏔 LA_GAILLARDE
        </button>
      </div>
    </div>

    <!-- Étape 2 : Numéro PS -->
    <div class="input-group">
      <label>Numéro de point signaleur</label>
      <input type="number" id="inputPS" placeholder="Ex : 33"
        min="1" max="250" inputmode="numeric" autocomplete="off" />
    </div>

    <!-- Étape 3 : Jour -->
    <div class="input-group">
      <label>Jour</label>
      <div style="display:flex;flex-direction:column;gap:8px;margin-top:4px">
        <button type="button" class="jour-btn" data-jour="J1" onclick="selectJour('J1')">J1 — Mercredi 07/10/2026</button>
        <button type="button" class="jour-btn" data-jour="J2" onclick="selectJour('J2')">J2 — Jeudi 08/10/2026</button>
        <button type="button" class="jour-btn" data-jour="J3" onclick="selectJour('J3')">J3 — Vendredi 09/10/2026</button>
        <button type="button" class="jour-btn" data-jour="J4" onclick="selectJour('J4')">J4 — Samedi 10/10/2026</button>
        <button type="button" class="jour-btn" data-jour="J5" onclick="selectJour('J5')">J5 — Dimanche 11/10/2026</button>
      </div>
    </div>

    <button class="btn-login" id="btnAcceder" onclick="acceder()">ACCÉDER À MA FICHE</button>
    <div class="error-msg" id="errMsg"></div>
  </div>

  <div class="login-jour-badge">
    Jour sélectionné : <strong id="loginJourLabel">—</strong>
  </div>
</div>

<!-- ======= ÉCRAN FICHE ======= -->
<div id="screenFiche">
  <div class="fiche-header">
    <div class="fiche-header-top">
      <div class="fiche-event">🚵 ROC D'AZUR 2026</div>
      <button class="btn-retour" onclick="retour()">← Retour</button>
    </div>
    <div class="fiche-ps-title" id="fichePSTitre">PS —</div>
    <div class="fiche-jour-bar">
      <span class="jour-chip" id="ficheJourChip">J1</span>
      <span class="date-chip" id="ficheDateChip">—</span>
    </div>
  </div>
  <div class="fiche-body" id="ficheBody"></div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx3-9qOcnRxX29beMLYWvaelrdwPK1eI4eGJKOfI4MUub0f99Bq1JTUHdtPYl4Qv432/exec';

const JOURS = [
  { id:'J1', label:'J1', date:'MERCREDI 07/10/2026' },
  { id:'J2', label:'J2', date:'JEUDI 08/10/2026' },
  { id:'J3', label:'J3', date:'VENDREDI 09/10/2026' },
  { id:'J4', label:'J4', date:'SAMEDI 10/10/2026' },
  { id:'J5', label:'J5', date:'DIMANCHE 11/10/2026' },
];

// Courses (alimentées dynamiquement depuis la réponse Apps Script)
const COURSES = {};

// ── État ──────────────────────────────────────────────────────────────────────
let JOUR_COURANT = 'J1';
let SOURCE       = 'ts'; // 'ts' | 'lg'

// ── JSONP ─────────────────────────────────────────────────────────────────────
function callAS(params) {
  return new Promise((resolve, reject) => {
    const cbName = 'cb_' + Math.random().toString(36).slice(2);
    const timer  = setTimeout(() => {
      delete window[cbName];
      reject(new Error('Timeout — connexion trop lente'));
    }, 45000);
    window[cbName] = data => {
      clearTimeout(timer);
      delete window[cbName];
      resolve(data);
    };
    const s = document.createElement('script');
    s.src = APPS_SCRIPT_URL + '?' + new URLSearchParams({ ...params, callback: cbName });
    s.onerror = () => { clearTimeout(timer); delete window[cbName]; reject(new Error('Erreur réseau')); };
    document.head.appendChild(s);
    setTimeout(() => { try { s.remove(); } catch(e){} }, 50000);
  });
}

// ── UI Login ──────────────────────────────────────────────────────────────────
function setSource(src) {
  SOURCE = src;
  document.getElementById('btnTS').className = 'source-btn' + (src === 'ts' ? ' active-ts' : '');
  document.getElementById('btnLG').className = 'source-btn' + (src === 'lg' ? ' active-lg' : '');
}

function selectJour(jid) {
  JOUR_COURANT = jid;
  document.querySelectorAll('.jour-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.jour === jid)
  );
  const info = JOURS.find(j => j.id === jid);
  document.getElementById('loginJourLabel').textContent = info.label + ' — ' + info.date;
}

function retour() {
  document.getElementById('screenFiche').style.display = 'none';
  document.getElementById('screenLogin').style.display = 'flex';
  document.getElementById('inputPS').value = '';
  document.getElementById('errMsg').textContent = '';
}

// Init J1 sélectionné par défaut
selectJour('J1');

document.addEventListener('keydown', e => { if (e.key === 'Enter') acceder(); });

// ── Accéder ───────────────────────────────────────────────────────────────────
async function acceder() {
  const errEl = document.getElementById('errMsg');
  const btn   = document.getElementById('btnAcceder');
  errEl.textContent = '';

  const psVal = parseInt(document.getElementById('inputPS').value);
  document.getElementById('inputPS').classList.remove('error');
  if (!psVal || psVal < 1 || psVal > 250) {
    document.getElementById('inputPS').classList.add('error');
    errEl.textContent = 'Numéro de PS invalide (1–250)';
    return;
  }

  btn.textContent = '⏳ Chargement…';
  btn.disabled = true;

  try {
    const json = await callAS({
      action: 'getFichePS',
      ps:     psVal,
      jour:   JOUR_COURANT,
      source: SOURCE,
    });

    if (!json.ok) throw new Error(json.error || 'Erreur inconnue');

    if (!json.data) {
      const sectLabel = SOURCE === 'lg' ? 'LA_GAILLARDE' : 'Tous Secteurs';
      errEl.textContent = `PS ${psVal} non trouvé — ${sectLabel} — ${JOUR_COURANT}`;
      return;
    }

    afficherFiche(psVal, JOUR_COURANT, json.data);

  } catch(e) {
    errEl.textContent = 'Erreur : ' + e.message;
  } finally {
    btn.textContent = 'ACCÉDER À MA FICHE';
    btn.disabled = false;
  }
}

// ── Affichage fiche ───────────────────────────────────────────────────────────
function afficherFiche(psNum, jourId, d) {
  const jour  = JOURS.find(j => j.id === jourId);
  const isLG  = (d.secteur === 'LA_GAILLARDE');
  const benvs = Array.isArray(d.benevoles) ? d.benevoles : [];

  // Header
  document.getElementById('ficheJourChip').textContent  = jour.label;
  document.getElementById('ficheDateChip').textContent  = jour.date;
  document.getElementById('fichePSTitre').innerHTML =
    `PS <span style="color:var(--rouge-vif)">${psNum}</span>` +
    ` — ${(d.ps || '').replace(/^\d+\s*[-–]\s*/, '')}` +
    `<span class="secteur-badge ${isLG ? 'lg' : 'ts'}">${isLG ? 'LA_GAILLARDE' : d.secteur}</span>`;

  // Courses depuis la réponse
  if (d.courses && d.courses.length) {
    d.courses.forEach(c => { COURSES[c.nom] = { jours: c.jours, ps: c.ps, couleur: c.couleur }; });
  }

  const body = document.getElementById('ficheBody');
  body.innerHTML = '';

  // ── Card 1 : Identification ──────────────────────────────────────────────
  const tel = d.telReferant || '—';
  let html1 = `<div class="fiche-card">
    <div class="fiche-card-header"><span class="card-icon">📍</span><span class="card-title">Mon Point Signaleur</span></div>
    <div class="fiche-card-body">`;

  if (isLG) {
    html1 += row('Secteur', `<span class="info-val secteur">LA_GAILLARDE</span>`, true);
    html1 += row('MeP par', d.referant || '—');
    if (tel !== '—') html1 += row('Tél. MeP', `<span class="info-val tel">📞 ${tel}</span>`, true);
    html1 += `<div style="border-top:1px solid var(--border);margin:8px 0"></div>`;
    html1 += row('Signaleur réf.', benvs[0] || '—');
    if (d.telB1 && d.telB1 !== '—') html1 += row('Tél. signaleur', `<span class="info-val tel">📞 ${d.telB1}</span>`, true);
    if (benvs.length > 1) html1 += row('Accompagnants', benvs.slice(1).join('<br>'));
  } else {
    html1 += row('Secteur', `<span class="info-val secteur">${d.secteur}</span>`, true);
    html1 += row('Référent', d.referant || '—');
    if (tel !== '—') html1 += row('Tél. référent', `<span class="info-val tel">📞 ${tel}</span>`, true);
    if (benvs.length > 1) html1 += row('Coéquipier(s)', benvs.slice(1).join('<br>'));
  }
  html1 += `</div></div>`;
  body.insertAdjacentHTML('beforeend', html1);

  // ── Card 2 : Heure MeP ───────────────────────────────────────────────────
  body.insertAdjacentHTML('beforeend', `
    <div class="fiche-card">
      <div class="fiche-card-header"><span class="card-icon">⏰</span><span class="card-title">Heure de mise en place</span></div>
      <div class="fiche-card-body">
        <div class="hmep-display">
          <div class="hmep-heure">${d.hmep || '—'}</div>
          <div class="hmep-label">HEURE D'ARRIVÉE AU POINT</div>
        </div>
        ${d.hmepSect ? `<div class="info-row" style="margin-top:8px">${rowInner('H MeP secteur','<span class="info-val highlight">'+d.hmepSect+'</span>')}</div>` : ''}
      </div>
    </div>`);

  // ── Card 3 : Véhicule ────────────────────────────────────────────────────
  const veh = [d.vehA, d.vehB].filter(Boolean).join(' + ');
  body.insertAdjacentHTML('beforeend', `
    <div class="fiche-card">
      <div class="fiche-card-header"><span class="card-icon">🚗</span><span class="card-title">Transport</span></div>
      <div class="fiche-card-body">
        ${veh
          ? `<div class="veh-badge"><span class="veh-icon">🚙</span><div><div class="veh-nom">${veh}</div></div></div>`
          : `<div style="color:var(--texte2);font-size:14px;padding:4px 0">Aucun véhicule — déposé par un autre</div>`}
      </div>
    </div>`);

  // ── Card 4 : Radios ──────────────────────────────────────────────────────
  body.insertAdjacentHTML('beforeend', `
    <div class="fiche-card">
      <div class="fiche-card-header"><span class="card-icon">📻</span><span class="card-title">Dotation Radios</span></div>
      <div class="fiche-card-body">
        <div class="radios-grid">
          ${[['COM','com',d.com],['COURSE','crs',d.crs],['COM V','cmv',d.cmv]].map(([lbl,cls,nb]) => `
            <div class="radio-card ${(nb||0)>0?cls:'off'}">
              <div class="radio-nb">${nb||0}</div>
              <div class="radio-type">${lbl}</div>
            </div>`).join('')}
        </div>
      </div>
    </div>`);

  // ── Card 5 : Courses & Distances ─────────────────────────────────────────
  const coursesCeJour = Object.entries(COURSES).filter(([,c]) =>
    Array.isArray(c.jours) && c.jours.includes(jourId) &&
    Array.isArray(c.ps) && c.ps.includes(psNum)
  );
  const kmR = d.kmRavit || ''; const kmA = d.kmAtelier || '';
  body.insertAdjacentHTML('beforeend', `
    <div class="fiche-card">
      <div class="fiche-card-header"><span class="card-icon">🏁</span><span class="card-title">Courses & Distances</span></div>
      <div class="fiche-card-body">
        ${coursesCeJour.length
          ? coursesCeJour.map(([nom,c]) => `<div class="course-item">
              <div class="course-dot" style="background:${c.couleur}"></div>
              <span class="course-nom">${nom}</span>
              <span style="font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;background:${c.couleur};color:#fff;border-radius:3px;padding:1px 7px">CE JOUR</span>
            </div>`).join('')
          : `<div style="color:var(--texte2);font-size:13px;padding:4px 0">Aucune course ce jour à ce PS</div>`}
        ${kmR ? `<div class="info-row" style="margin-top:8px">${rowInner('Km ravitaillement','<span class="info-val highlight">'+kmR+' km</span>')}</div>` : ''}
        ${kmA ? `<div class="info-row">${rowInner('Km atelier','<span class="info-val highlight">'+kmA+' km</span>')}</div>` : ''}
        ${!coursesCeJour.length && !kmR && !kmA ? `<div style="color:var(--texte2);font-size:12px;margin-top:6px;font-style:italic">Distances Orga non encore disponibles</div>` : ''}
      </div>
    </div>`);

  // ── Card 6 : Coéquipiers (TS uniquement) ─────────────────────────────────
  if (!isLG && d.coequipiers && d.coequipiers.length) {
    const equip = d.coequipiers.map(eq =>
      (eq.benevoles||[]).map(b => {
        const ini = b.replace('Bénévole_','B').slice(0,4);
        const psL = (eq.ps||'').match(/^(\S+)/)?.[1] || eq.ps;
        return `<div class="equipe-item">
          <div class="equipe-avatar">${ini}</div>
          <span class="equipe-nom">${b}</span>
          <span class="equipe-ps">PS ${psL}</span>
        </div>`;
      }).join('')
    ).join('');
    body.insertAdjacentHTML('beforeend', `
      <div class="fiche-card">
        <div class="fiche-card-header"><span class="card-icon">👥</span><span class="card-title">Autres bénévoles — ${d.secteur}</span></div>
        <div class="fiche-card-body"><div class="equipe-list">${equip}</div></div>
      </div>`);
  }

  // ── Card 7 : Commentaires ────────────────────────────────────────────────
  const comms = (d.commentaires||[]).filter(Boolean);
  if (comms.length) {
    body.insertAdjacentHTML('beforeend', `
      <div class="fiche-card">
        <div class="fiche-card-header"><span class="card-icon">📝</span><span class="card-title">Commentaires</span></div>
        <div class="fiche-card-body">
          ${comms.map(c=>`<div class="obs-text">• ${c}</div>`).join('')}
        </div>
      </div>`);
  }

  // ── Card 8 : Observation ─────────────────────────────────────────────────
  const obs = (d.obs||'').trim();
  if (obs && !obs.toLowerCase().includes('déposé')) {
    body.insertAdjacentHTML('beforeend', `
      <div class="fiche-card">
        <div class="fiche-card-header"><span class="card-icon">⚠️</span><span class="card-title">Note importante</span></div>
        <div class="fiche-card-body"><div class="obs-text">⚠ ${obs}</div></div>
      </div>`);
  }

  // ── Urgence ───────────────────────────────────────────────────────────────
  body.insertAdjacentHTML('beforeend', `
    <div class="urgence-banner">
      <div class="urgence-title">🚨 En cas d'accident</div>
      <div class="urgence-text">
        Contacte le <strong>PC ROC sur RADIO COURSE</strong>
        ${tel !== '—' ? `<br>ou appelle <strong>${tel}</strong>` : ''}
      </div>
    </div>`);

  // Afficher
  document.getElementById('screenLogin').style.display = 'none';
  document.getElementById('screenFiche').style.display = 'flex';
  window.scrollTo(0, 0);
}

// ── Helpers HTML ──────────────────────────────────────────────────────────────
function rowInner(label, valHtml) {
  return `<span class="info-label">${label}</span>${valHtml}`;
}
function row(label, val, rawHtml) {
  const valPart = rawHtml ? val : `<span class="info-val">${val}</span>`;
  return `<div class="info-row"><span class="info-label">${label}</span>${valPart}</div>`;
}
</script>
</body>
</html>
